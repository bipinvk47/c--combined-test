# GitHub Actions — .NET platform metrics (publish size, deps, build time, NuGet cycles, unused imports)
name: Platform metrics

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:
    branches:
      - main
      - dev
      - "feature/**"

permissions:
  contents: read

jobs:
  dotnet-platform-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Export metrics
        run: python3 scripts/export_platform_metrics.py

      - uses: actions/upload-artifact@v4
        with:
          name: dotnet-platform-dependency-report
          path: metrics/platform_dependency_report.json
